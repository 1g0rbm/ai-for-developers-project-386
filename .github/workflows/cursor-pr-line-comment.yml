name: cursor-pr-line-comment

on:
  pull_request_review_comment:
    types: [created]

concurrency:
  group: cursor-pr-line-comment-${{ github.event.comment.id || github.run_id }}
  cancel-in-progress: false

jobs:
  cursor-agent:
    if: |
      github.event.comment.user.type != 'Bot' && (
        contains(github.event.comment.body, ' /cursor') ||
        startsWith(github.event.comment.body, '/cursor') ||
        contains(github.event.comment.body, ' /oc') ||
        startsWith(github.event.comment.body, '/oc') ||
        contains(github.event.comment.body, ' /opencode') ||
        startsWith(github.event.comment.body, '/opencode')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Resolve GitHub context
        id: context
        uses: actions/github-script@v8
        with:
          script: |
            const truncate = (value, limit = 4000) => {
              if (!value) return "";
              return value.length > limit ? `${value.slice(0, limit)}\n...[truncated]` : value;
            };

            const pr = context.payload.pull_request;
            const currentComment = context.payload.comment;

            const reviewComments = await github.paginate(github.rest.pulls.listReviewComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const issueComments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100,
            });

            const rootId = currentComment.in_reply_to_id ?? currentComment.id;
            const reviewThread = reviewComments
              .filter((comment) => comment.id === rootId || comment.in_reply_to_id === rootId)
              .slice(-20);

            const discussionParts = [`Заголовок PR: ${pr.title}`];
            if (pr.body) {
              discussionParts.push(`Описание PR:\n${truncate(pr.body)}`);
            }

            discussionParts.push(
              ...issueComments.slice(-20).map((comment) => `Комментарий @${comment.user.login}:\n${truncate(comment.body)}`),
            );

            const reviewThreadParts = [];
            if (currentComment.diff_hunk) {
              reviewThreadParts.push(`Diff-контекст:\n${truncate(currentComment.diff_hunk, 3000)}`);
            }

            reviewThreadParts.push(
              ...reviewThread.map((comment) => `Review-комментарий @${comment.user.login}:\n${truncate(comment.body)}`),
            );

            const commentBody = currentComment.body;
            const withoutTrigger = commentBody
              .replace(/(?:^|\s)\/(?:cursor|oc|opencode)\b/g, " ")
              .trim();

            const [rawMode = "", ...restWords] = withoutTrigger.split(/\s+/).filter(Boolean);
            const normalizedMode = rawMode.toLowerCase();
            const mode = normalizedMode === "fix" ? "fix" : "explain";
            const commandText = restWords.join(" ").trim();

            const currentRepo = `${context.repo.owner}/${context.repo.repo}`;
            const headRepo = pr.head.repo.full_name;
            const sameRepo = headRepo === currentRepo;
            const canPushToHead = sameRepo && mode === "fix";

            core.setOutput("mode", mode);
            core.setOutput("pr_number", String(pr.number));
            core.setOutput("pr_title", pr.title);
            core.setOutput("comment_body", commentBody);
            core.setOutput("command_text", commandText);
            core.setOutput("comment_author", currentComment.user.login);
            core.setOutput("comment_url", currentComment.html_url);
            core.setOutput("review_path", currentComment.path || "");
            core.setOutput("review_line", currentComment.line ? String(currentComment.line) : "");
            core.setOutput("review_start_line", currentComment.start_line ? String(currentComment.start_line) : "");
            core.setOutput("review_original_line", currentComment.original_line ? String(currentComment.original_line) : "");
            core.setOutput("review_original_start_line", currentComment.original_start_line ? String(currentComment.original_start_line) : "");
            core.setOutput("review_side", currentComment.side || "");
            core.setOutput("review_thread_context", reviewThreadParts.join("\n\n---\n\n"));
            core.setOutput("discussion_context", discussionParts.join("\n\n---\n\n"));
            core.setOutput("head_ref", pr.head.ref);
            core.setOutput("head_sha", pr.head.sha);
            core.setOutput("base_ref", pr.base.ref);
            core.setOutput("head_repo", headRepo);
            core.setOutput("can_push_to_head", String(canPushToHead));

      - name: Checkout repository
        if: steps.context.outputs.mode == 'fix'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          repository: ${{ steps.context.outputs.head_repo }}
          ref: ${{ steps.context.outputs.head_sha }}

      - name: Install Cursor Agent
        run: curl https://cursor.com/install -fsS | bash

      - name: Run Cursor Agent in explain mode
        id: cursor_explain
        if: steps.context.outputs.mode == 'explain'
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          COMMENT_BODY: ${{ steps.context.outputs.comment_body }}
          COMMAND_TEXT: ${{ steps.context.outputs.command_text }}
          COMMENT_AUTHOR: ${{ steps.context.outputs.comment_author }}
          COMMENT_URL: ${{ steps.context.outputs.comment_url }}
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}
          PR_TITLE: ${{ steps.context.outputs.pr_title }}
          REVIEW_PATH: ${{ steps.context.outputs.review_path }}
          REVIEW_LINE: ${{ steps.context.outputs.review_line }}
          REVIEW_START_LINE: ${{ steps.context.outputs.review_start_line }}
          REVIEW_ORIGINAL_LINE: ${{ steps.context.outputs.review_original_line }}
          REVIEW_ORIGINAL_START_LINE: ${{ steps.context.outputs.review_original_start_line }}
          REVIEW_SIDE: ${{ steps.context.outputs.review_side }}
          REVIEW_THREAD_CONTEXT: ${{ steps.context.outputs.review_thread_context }}
          DISCUSSION_CONTEXT: ${{ steps.context.outputs.discussion_context }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"

          prompt_file="$(mktemp)"
          cat >"$prompt_file" <<EOF
          Ты работаешь внутри GitHub Actions в репозитории $REPOSITORY.
          Режим: line comment explain.
          Автор комментария: @$COMMENT_AUTHOR.
          Ссылка на комментарий: $COMMENT_URL.

          Контекст позиции в diff:
          - pr_number: $PR_NUMBER
          - pr_title: $PR_TITLE
          - review_path: $REVIEW_PATH
          - review_line: $REVIEW_LINE
          - review_start_line: $REVIEW_START_LINE
          - review_original_line: $REVIEW_ORIGINAL_LINE
          - review_original_start_line: $REVIEW_ORIGINAL_START_LINE
          - review_side: $REVIEW_SIDE

          Контекст review-thread:
          $REVIEW_THREAD_CONTEXT

          Общая сводка PR и обсуждения:
          $DISCUSSION_CONTEXT

          Исходный комментарий пользователя:
          $COMMENT_BODY

          Дополнительная инструкция после команды explain:
          $COMMAND_TEXT

          Это workflow для комментария к конкретной строке diff.
          Сначала анализируй место комментария, diff-контекст и review-thread.
          Только потом используй общую сводку PR, если это действительно нужно.
          Не проси пользователя повторно указывать файл или строку.
          Не превращай локальное замечание в общий review всего PR.

          Дай краткий и прикладной ответ:
          - что именно замечено в этом месте;
          - что можно сделать;
          - какие ограничения или сомнения есть.

          Правила:
          - отвечай по-русски;
          - будь конкретным и кратким;
          - не проси пользователя запускать локальные команды;
          - не спрашивай подтверждений, ты работаешь в CI.
          EOF

          cursor-agent --force --print --output-format text "$(cat "$prompt_file")" | tee cursor-output.txt

      - name: Run Cursor Agent in fix mode
        id: cursor_fix
        if: steps.context.outputs.mode == 'fix'
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          COMMENT_BODY: ${{ steps.context.outputs.comment_body }}
          COMMAND_TEXT: ${{ steps.context.outputs.command_text }}
          COMMENT_AUTHOR: ${{ steps.context.outputs.comment_author }}
          COMMENT_URL: ${{ steps.context.outputs.comment_url }}
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}
          PR_TITLE: ${{ steps.context.outputs.pr_title }}
          REVIEW_PATH: ${{ steps.context.outputs.review_path }}
          REVIEW_LINE: ${{ steps.context.outputs.review_line }}
          REVIEW_START_LINE: ${{ steps.context.outputs.review_start_line }}
          REVIEW_ORIGINAL_LINE: ${{ steps.context.outputs.review_original_line }}
          REVIEW_ORIGINAL_START_LINE: ${{ steps.context.outputs.review_original_start_line }}
          REVIEW_SIDE: ${{ steps.context.outputs.review_side }}
          REVIEW_THREAD_CONTEXT: ${{ steps.context.outputs.review_thread_context }}
          DISCUSSION_CONTEXT: ${{ steps.context.outputs.discussion_context }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"

          prompt_file="$(mktemp)"
          cat >"$prompt_file" <<EOF
          Ты работаешь внутри GitHub Actions в репозитории $REPOSITORY.
          Режим: line comment fix.
          Автор комментария: @$COMMENT_AUTHOR.
          Ссылка на комментарий: $COMMENT_URL.

          Контекст позиции в diff:
          - pr_number: $PR_NUMBER
          - pr_title: $PR_TITLE
          - review_path: $REVIEW_PATH
          - review_line: $REVIEW_LINE
          - review_start_line: $REVIEW_START_LINE
          - review_original_line: $REVIEW_ORIGINAL_LINE
          - review_original_start_line: $REVIEW_ORIGINAL_START_LINE
          - review_side: $REVIEW_SIDE

          Контекст review-thread:
          $REVIEW_THREAD_CONTEXT

          Общая сводка PR и обсуждения:
          $DISCUSSION_CONTEXT

          Исходный комментарий пользователя:
          $COMMENT_BODY

          Дополнительная инструкция после команды fix:
          $COMMAND_TEXT

          Это workflow для комментария к конкретной строке diff.
          Сначала анализируй место комментария, diff-контекст и review-thread.
          Затем исследуй код только в той степени, которая нужна для исправления замечания.
          Не проси пользователя повторно указывать файл или строку.
          Если задача понятна и реалистична, внеси изменения в рабочую директорию и сохрани файлы.

          В ответе:
          - кратко объясни, что было сделано;
          - перечисли измененные файлы;
          - укажи ограничения или сомнения, если они есть.

          Правила:
          - отвечай по-русски;
          - не проси пользователя запускать локальные команды;
          - не спрашивай подтверждений, ты работаешь в CI.
          EOF

          cursor-agent --force --print --output-format text "$(cat "$prompt_file")" | tee cursor-output.txt

      - name: Detect changes
        id: diff
        if: success() && steps.context.outputs.mode == 'fix'
        run: |
          set -euo pipefail
          if git diff --quiet && git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git
        if: steps.context.outputs.mode == 'fix' && steps.diff.outputs.has_changes == 'true'
        run: |
          git config user.name "cursor-agent[bot]"
          git config user.email "cursor-agent[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Commit and push to PR branch
        id: push_pr
        if: steps.context.outputs.mode == 'fix' && steps.diff.outputs.has_changes == 'true' && steps.context.outputs.can_push_to_head == 'true'
        run: |
          set -euo pipefail
          git add -A
          git commit -m "cursor-agent: apply line-comment changes"
          git push origin "HEAD:${TARGET_BRANCH}"
          echo "branch_name=${TARGET_BRANCH}" >> "$GITHUB_OUTPUT"
        env:
          TARGET_BRANCH: ${{ steps.context.outputs.head_ref }}

      - name: Create branch and PR
        id: create_pr
        if: steps.context.outputs.mode == 'fix' && steps.diff.outputs.has_changes == 'true' && steps.context.outputs.can_push_to_head != 'true'
        run: |
          set -euo pipefail
          branch="cursor-agent/pr-${PR_NUMBER}-${RUN_ID}-${RUN_ATTEMPT}"
          title="Cursor Agent changes for PR #${PR_NUMBER}"
          body=$'Автоматические изменения от Cursor Agent по line-comment.\n\nИсходный контекст: PR #'${PR_NUMBER}$'.'

          git checkout -b "$branch"
          git add -A
          git commit -m "cursor-agent: apply line-comment changes"
          git push origin "$branch"

          pr_url="$(gh pr create \
            --base "${BASE_REF}" \
            --head "$branch" \
            --title "$title" \
            --body "$body")"

          echo "branch_name=$branch" >> "$GITHUB_OUTPUT"
          echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}
          BASE_REF: ${{ steps.context.outputs.base_ref }}

      - name: Post reply
        if: always()
        uses: actions/github-script@v8
        env:
          MODE: ${{ steps.context.outputs.mode }}
          ISSUE_NUMBER: ${{ steps.context.outputs.pr_number }}
          CURSOR_OUTPUT_FILE: cursor-output.txt
          CURSOR_EXPLAIN_STATUS: ${{ steps.cursor_explain.outcome }}
          CURSOR_FIX_STATUS: ${{ steps.cursor_fix.outcome }}
          HAS_CHANGES: ${{ steps.diff.outputs.has_changes || 'false' }}
          PUSHED_TO_PR_BRANCH: ${{ steps.push_pr.outcome == 'success' && 'true' || 'false' }}
          PUSH_BRANCH_NAME: ${{ steps.push_pr.outputs.branch_name }}
          CREATED_PR_URL: ${{ steps.create_pr.outputs.pr_url }}
          CREATED_BRANCH_NAME: ${{ steps.create_pr.outputs.branch_name }}
        with:
          script: |
            const fs = require("fs");
            const mode = process.env.MODE;
            const issueNumber = Number(process.env.ISSUE_NUMBER);
            const cursorStatus = mode === "fix"
              ? process.env.CURSOR_FIX_STATUS
              : process.env.CURSOR_EXPLAIN_STATUS;
            const path = process.env.CURSOR_OUTPUT_FILE;
            const hasChanges = process.env.HAS_CHANGES === "true";
            const pushedToPrBranch = process.env.PUSHED_TO_PR_BRANCH === "true";
            const pushBranchName = process.env.PUSH_BRANCH_NAME;
            const createdPrUrl = process.env.CREATED_PR_URL;
            const createdBranchName = process.env.CREATED_BRANCH_NAME;

            let body = "";

            if (cursorStatus && cursorStatus !== "success") {
              body += "Cursor Agent завершился с ошибкой.\n";
            }

            if (fs.existsSync(path)) {
              const text = fs.readFileSync(path, "utf8").trim();
              if (text) {
                body += text.length > 50000 ? `${text.slice(0, 50000)}\n\n[output truncated]\n` : `${text}\n`;
              }
            } else if (!body) {
              body = "Cursor Agent не вернул текстовый ответ.\n";
            }

            if (mode === "fix") {
              if (hasChanges) {
                if (pushedToPrBranch) {
                  body += `\nИзменения закоммичены и отправлены в текущую ветку PR: \`${pushBranchName}\`.\n`;
                } else if (createdPrUrl) {
                  body += `\nИзменения вынесены в отдельную ветку \`${createdBranchName}\` и оформлены в PR: ${createdPrUrl}\n`;
                }
              } else if (cursorStatus === "success") {
                body += "\nИзменений в файлах не потребовалось.\n";
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: body.trim(),
            });
