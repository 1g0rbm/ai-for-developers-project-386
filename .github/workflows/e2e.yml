name: e2e

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Установка инструментов (Node, Python из .mise.toml)
        run: mise install

      - name: npm ci в e2e (перед установкой браузера)
        run: mise run e2e:install

      - name: Chromium и системные библиотеки для Playwright
        run: cd e2e && npx playwright install --with-deps chromium

      - name: Интеграционные тесты
        env:
          CI: true
        run: mise run e2e:test

      - name: Отчёт Playwright при падении
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
